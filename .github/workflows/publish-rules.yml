name: Publish Agent Rules (Latest)

on:
  push:
    branches:
      - main # Твоя основная ветка
    paths:
      - '.agent/**'
      - 'README.md'
      - '.github/workflows/publish-rules.yml'

permissions:
  contents: write

jobs:
  publish-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 📦 Pack Rules with Full Path
        run: |
          # Архивируем папку .agent/rules целиком, сохраняя структуру путей.
          # При распаковке архива в корень другого проекта, папки .agent/rules создадутся сами.
          zip -r agent_rules.zip .agent/rules
          
          echo "✅ Rules packed into agent_rules.zip (structure preserved)"
          unzip -l agent_rules.zip # Проверка содержимого для логов

      - name: 🔄 Update 'latest' Tag
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Пересоздаем тег latest
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          git tag latest
          git push origin latest

      - name: 🚀 Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Создаем релиз latest (если нет) и загружаем файл с перезаписью (--clobber)
          gh release create latest \
            --title "Latest Agent Rules" \
            --notes "Автоматическое обновление правил: $(date -u)" \
            --prerelease=false \
            --latest=true \
            || true

          gh release upload latest agent_rules.zip --clobber
