name: Publish Agent Rules (Latest)

on:
  push:
    branches:
      - main # Твоя основная ветка
    paths:
      - '.agent/**'
      - 'README.md'
      - '.github/workflows/publish-rules.yml'

permissions:
  contents: write

jobs:
  publish-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: 🔄 Update 'latest' Tag
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Пересоздаем тег latest
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          git tag latest
          git push origin latest

      - name: 🚀 Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Создаем релиз latest (если нет) и загружаем файл с перезаписью (--clobber)
          gh release create latest \
            --title "Latest Agent Rules" \
            --notes "Автоматическое обновление правил: $(date -u)" \
            --prerelease=false \
            --latest=true \
            || true

          gh release upload latest scripts/install_github.py --clobber
